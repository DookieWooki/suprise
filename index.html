<!DOCTYPE html>
<html>
<head>
  <title>Image Popup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
  height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center; 
  align-items: center;     
}
    #popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 10px;
      border: 0px solid black;
    }

    #popup img {
  max-width: 90vw;
  max-height: 80vh;
  width: auto;
  height: auto;
    }
    button {
  font-size: 20px;
  padding: 15px 25px;
}
  </style>
</head>

<body>

<button onclick="showImage(this)">Klik hier voor een suprise</button>

<div id="popup">
  <img src="rat.jpg" alt="Popup Image">
  <br>
</div>

<audio id="sound" src="Circus.mp4"></audio>
<script>

  function showImage(btn) {
    document.getElementById("popup").style.display = "block";
    btn.style.display = "none"; 
        document.getElementById("sound").play();
  }
</script>

  </body>
</html>
